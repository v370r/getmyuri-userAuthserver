application:
  security:
    jwt:
      secret-key: "YOUR_VERY_STRONG_AND_LONG_SECURE_SECRET_KEY_REPLACE_THIS" # IMPORTANT: Replace with a real secret
      expiration: 86400000 # 24 hours in milliseconds

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/user_auth_db # Replace with your actual DB URL
    username: your_db_user # Replace with your DB username
    password: your_db_password # Replace with your DB password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Or 'validate' or 'none' for prod, 'create' or 'create-drop' for initial dev/test
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true # Optional: good for development to see generated SQL
    profiles:
        active: dev
    servlet:
        multipart:
            max-file-size:
                50MB
springdoc:
    default-produces-media-type: application/json

server:
    servlet:
        context-path: /api/v1